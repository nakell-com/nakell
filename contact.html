<!DOCTYPE html>

<head>

<meta name="description" content="Nakell株式会社へのお問い合わせ。制作依頼、ご相談、お見積もりなど。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="teardrop teardrop-sm"></span><span>NAKELL</span></a>
    <button class="nav-toggle" aria-label="メニュー"><span></span><span></span><span></span></button>
    <ul class="nav-menu">
      <li><a href="company.html">会社紹介</a></li>
      <li><a href="service.html">サービス</a></li>
      <li><a href="news.html">お知らせ</a></li>
      <li><a href="contact.html">お問い合わせ</a></li>
      <li><a href="contact.html" class="nav-cta">無料で相談</a></li>
    </ul>
  </div>
</header>

<div class="page-header">
  <span class="label">CONTACT</span>
  <h1>お問い合わせ</h1>
</div>

<section class="bg-off">
  <div class="container">
    <p style="text-align:center; margin-bottom:40px; color:var(--text-sub); font-size:15px;">
      制作のご依頼、ご相談、取材のお問い合わせなど、<br>
      下記フォームよりお気軽にご連絡ください。
    </p>

    <form id="contact-form" class="contact-form" action="https://formspree.io/f/myklzang" method="POST">
      <div class="form-row">
        <label for="company">会社名<span class="opt">任意</span></label>
        <input type="text" id="company" name="company">
      </div>
      <div class="form-row">
        <label for="name">お名前<span class="req">必須</span></label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-row">
        <label for="email">メールアドレス<span class="req">必須</span></label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-row">
        <label for="tel">電話番号<span class="opt">任意</span></label>
        <input type="tel" id="tel" name="tel">
      </div>
      <div class="form-row">
        <label for="message">お問い合わせ内容<span class="req">必須</span></label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <div class="form-submit">
        <button type="submit">送信する</button>
      </div>
    </form>

    <div id="form-thanks" class="form-thanks contact-form">
      <h3>お問い合わせありがとうございました</h3>
      <p>内容を確認のうえ、担当者よりご返信いたします。<br>今しばらくお待ちくださいませ。</p>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-top">
      <a href="index.html" class="footer-logo"><span class="teardrop teardrop-sm"></span><span>NAKELL</span></a>
      <ul class="footer-nav">
        <li><a href="company.html">会社紹介</a></li>
        <li><a href="service.html">サービス</a></li>
        <li><a href="news.html">お知らせ</a></li>
        <li><a href="contact.html">お問い合わせ</a></li>
        <li><a href="privacy.html">プライバシーポリシー</a></li>
      </ul>
    </div>
    <div class="footer-copy">© 2026 Nakell株式会社</div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
